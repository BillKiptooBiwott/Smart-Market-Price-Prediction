{% extends "base.html" %}

{% block title %}Login - Smart Market Price Prediction{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <h2 style="color: #2e7d32; margin-bottom: 2rem; text-align: center;">Login to Your Account</h2>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        
        <p class="text-center mt-3">
            Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: #2e7d32;">Sign up here</a>
        </p>
    </div>
</div>
{% endblock %}
