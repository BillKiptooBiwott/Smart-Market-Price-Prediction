{% extends "base.html" %}

{% block title %}Sign Up - Smart Market Price Prediction{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 style="color: #2e7d32; margin-bottom: 2rem; text-align: center;">Create New Account</h2>
        
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="grid-2">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" class="form-control" id="phone" name="phone">
                </div>
            </div>
            
            <div class="form-group">
                <label for="county">County</label>
                <select class="form-control" id="county" name="county">
                    <option value="">-- Select your county --</option>
                    {% for county in counties %}
                        <option value="{{ county }}">{{ county }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        
        <p class="text-center mt-3">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #2e7d32;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
